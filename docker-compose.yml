version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: scheduler_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: SchedulerSecure123!
      POSTGRES_DB: distributed_job_scheduler
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: scheduler_redis
    restart: always
    command: redis-server --save "" --appendonly no
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: scheduler_api
    restart: always
    environment:
      DATABASE_URL: postgresql://postgres:SchedulerSecure123!@postgres:5432/distributed_job_scheduler
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: JWT_Super_Secret_Key_For_Job_Scheduler_2026_!
      PORT: 3000
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: scheduler_worker
    restart: always
    environment:
      DATABASE_URL: postgresql://postgres:SchedulerSecure123!@postgres:5432/distributed_job_scheduler
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ENV: production
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: scheduler_web
    restart: always
    ports:
      - "80:3000"
    depends_on:
      - api

volumes:
  postgres_data:
